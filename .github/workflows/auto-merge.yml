name: Auto-merge dev branch to main

# Verifies, fast-forwards (or merge-commits) `main` when a push lands on a
# `claude/**` branch, then publishes the build to Pages via the classic
# `gh-pages` branch flow.
#
# Why gh-pages instead of actions/deploy-pages:
#   The default `github-pages` environment protection rule only allows the
#   repo's default branch. This workflow is triggered by a claude/** push,
#   so actions/deploy-pages would get blocked by the environment check even
#   though we checkout main. A GITHUB_TOKEN-pushed branch, by contrast, is
#   picked up by Pages' built-in branch deploy without any environment
#   gating — so we publish to gh-pages and let Pages serve it from there.

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc -b --noEmit
      - run: npm test
      - run: npm run build

  merge:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      merged_sha: ${{ steps.merged.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Fast-forward main to ${{ needs.verify.outputs.sha }}
        id: merged
        run: |
          git fetch origin main
          git checkout main
          if git merge --ff-only "${{ needs.verify.outputs.sha }}"; then
            echo "fast-forwarded"
          else
            git merge --no-ff -m "Auto-merge ${{ github.ref_name }} (${GITHUB_SHA::7})" "${{ needs.verify.outputs.sha }}"
          fi
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.merge.outputs.merged_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
